services:

  server:
    build:
      context:    .
      dockerfile: docker/Dockerfile
      target:     server
    environment:
      NODE_ENV: production
      PORT:     "3000"
    restart: unless-stopped
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 3s
      timeout:  5s
      retries:  5

  nginx:
    build:
      context:    .
      dockerfile: docker/Dockerfile
      target:     client
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
